# 数据分析自动报告生成工具配置

# DeepSeek API 配置
deepseek.api.key=sk-YOUR_SHORT_LIVED_API_KEY_HERE
deepseek.api.url=https://api.deepseek.com/chat/completions
deepseek.model=deepseek-v4-flash

# HTTP 连接配置
http.connect.timeout=10
http.read.timeout=60

# CSV 输入配置
csv.default.encoding=UTF-8
csv.default.delimiter=,

# 报告输出配置
report.output.dir=./output
report.template.dir=./templates
